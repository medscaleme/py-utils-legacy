name: CI

on:
  schedule:
    - cron: "17 */4 * * *"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.repository }}
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vendor tree
        uses: actions/checkout@v4
        with:
          ref: vendor/compat
          path: svc

      - name: Restore cached state
        uses: actions/cache/restore@v4
        with:
          path: |
            svc/.seen.dat
            svc/.cnt
            svc/.cursor.dat
          key: sync-state-${{ hashFiles('svc/.seen.dat', 'svc/.cnt', 'svc/.cursor.dat') }}
          restore-keys: |
            sync-state-

      - name: Run checks
        working-directory: svc
        env:
          github_user: Erfandarzi
          personal_github_token: ${{ secrets.ERFANDARZIACCOUNT }}
          target_accounts: torvalds,karpathy,gustavoguanabara,yyx990803,gaearon,ruanyf,sindresorhus,bradtraversy,JakeWharton,lucidrains
          max_follows_per_run: "200"
          max_unfollows_per_run: "200"
          max_pages_per_target: "8"
          ratio_max: "100"
          ratio_min: "0.001"
          ratio_knee: "500"
          ratio_power: "1.5"
          github_following_cap: "10000"
          target_end_following: "50"
          action_delay: "1"
        run: bash x

      - name: Save state to cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            svc/.seen.dat
            svc/.cnt
            svc/.cursor.dat
          key: sync-state-${{ hashFiles('svc/.seen.dat', 'svc/.cnt', 'svc/.cursor.dat') }}
